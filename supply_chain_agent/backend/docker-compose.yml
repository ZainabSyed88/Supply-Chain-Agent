version: '3.8'

services:
  supply-chain-agent:
    build: .
    container_name: supply-chain-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    ports:
      - "8501:8501"  # Streamlit dashboard
    networks:
      - supply-chain-network
    restart: unless-stopped

  # Optional: PostgreSQL for data persistence
  postgres:
    image: postgres:15
    container_name: supply-chain-db
    environment:
      - POSTGRES_DB=supply_chain
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - supply-chain-network
    restart: unless-stopped

networks:
  supply-chain-network:
    driver: bridge

volumes:
  postgres_data:
